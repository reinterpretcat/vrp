name: Measure code coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# we set `opt-level = 1` in profile.test globally, but this affects code coverage, so we reset it here
env:
  CARGO_PROFILE_TEST_OPT_LEVEL: 0

jobs:
  measure-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Generate code coverage
        run: |
          cargo install --features vendored-openssl cargo-tarpaulin
          cargo tarpaulin --exclude-files *_test.rs *tests* *benches* *heuristic-research* --out xml

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          # Coverage upload is informational. A Codecov outage or transient
          # rate limit should not turn the whole CI red; the cobertura.xml
          # is still archived as an artifact in the next step.
          fail_ci_if_error: false

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: cobertura.xml
